name: Publish

# Publishes to npm when a version tag (v1.2.3) is pushed.
# Auth via npm Trusted Publishing (OIDC) — NO NPM_TOKEN secret needed.
# Requires: the @vidalytics/mcp package configured on npmjs.com with this
# repository + workflow (publish.yml) as a trusted publisher, and a public
# repo (for provenance).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Pin npm to a version that supports trusted publishing
        # Pinned (not @latest) for reproducible releases; bump deliberately.
        run: npm install -g npm@11.5.1

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      - name: Run tests
        run: npm test

      - name: Publish to npm (Trusted Publishing / OIDC)
        run: npm publish --provenance --access public
