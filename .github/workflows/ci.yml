name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Syntax check
        run: find bin lib test -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Run tests
        run: npm test

      - name: Verify package contents
        run: npm pack --dry-run
